<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document RAG</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f4f5f7;
        color: #1a1a2e;
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: #1a1a2e;
      }

      .container {
        max-width: 860px;
        margin: 0 auto;
      }

      .card {
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.4rem;
        color: #374151;
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 0.9rem;
        font-family: inherit;
        background: #fafafa;
        transition: border-color 0.15s;
        resize: vertical;
      }

      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: #4f6ef7;
        background: #fff;
      }

      .field {
        margin-bottom: 1rem;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1.25rem;
      }

      button {
        padding: 0.5rem 1.25rem;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          opacity 0.15s;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      #submit-btn {
        background: #4f6ef7;
        color: #fff;
      }

      #submit-btn:hover:not(:disabled) {
        background: #3a56d4;
      }

      #reload-btn {
        background: #e5e7eb;
        color: #374151;
      }

      #reload-btn:hover:not(:disabled) {
        background: #d1d5db;
      }

      #results-panel {
        min-height: 120px;
      }

      #results-panel:empty::before {
        content: "Los resultados apareceran aqui despues de que hagas una pregunta.";
        color: #9ca3af;
        font-size: 0.9rem;
        font-style: italic;
      }

      #answer-text {
        word-break: break-word;
        font-family: inherit;
        font-size: 0.9rem;
        line-height: 1.6;
        margin-bottom: 1rem;
      }

      /* ── Markdown rendered content styles ──────────────────────────────── */
      #answer-text h1,
      #answer-text h2,
      #answer-text h3,
      #answer-text h4 {
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #1a1a2e;
      }

      #answer-text h1 { font-size: 1.3rem; }
      #answer-text h2 { font-size: 1.15rem; }
      #answer-text h3 { font-size: 1.05rem; }

      #answer-text p {
        margin-bottom: 0.75rem;
      }

      #answer-text ul,
      #answer-text ol {
        padding-left: 1.5rem;
        margin-bottom: 0.75rem;
      }

      #answer-text li {
        margin-bottom: 0.3rem;
      }

      #answer-text code {
        background: #f3f4f6;
        padding: 0.15rem 0.4rem;
        border-radius: 3px;
        font-size: 0.85rem;
        font-family: 'Consolas', 'Monaco', monospace;
      }

      #answer-text pre {
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        margin-bottom: 0.75rem;
      }

      #answer-text pre code {
        background: none;
        padding: 0;
        color: inherit;
        font-size: 0.85rem;
      }

      #answer-text blockquote {
        border-left: 3px solid #4f6ef7;
        padding-left: 1rem;
        margin: 0.75rem 0;
        color: #4b5563;
      }

      #answer-text table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 0.75rem;
        font-size: 0.85rem;
      }

      #answer-text th,
      #answer-text td {
        border: 1px solid #e5e7eb;
        padding: 0.4rem 0.6rem;
        text-align: left;
      }

      #answer-text th {
        background: #f9fafb;
        font-weight: 600;
      }

      #answer-text strong {
        font-weight: 600;
      }

      #answer-text a {
        color: #4f6ef7;
        text-decoration: underline;
      }

      .citations-block {
        margin-bottom: 1rem;
        font-size: 0.875rem;
      }

      .citations-block summary {
        cursor: pointer;
        font-weight: 500;
        color: #374151;
        padding: 0.25rem 0;
      }

      .citations-block pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        padding: 0.75rem;
        margin-top: 0.5rem;
        font-size: 0.8rem;
      }

      .scores {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
      }

      .score-item {
        font-size: 0.875rem;
        color: #374151;
      }

      .score-item strong {
        color: #1a1a2e;
      }

      .flagged-warning {
        display: inline-block;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fcd34d;
        border-radius: 4px;
        padding: 0.35rem 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }

      .issues-block,
      .missing-files-block {
        margin-bottom: 0.75rem;
        font-size: 0.875rem;
      }

      .issues-block h4,
      .missing-files-block h4 {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
        color: #374151;
      }

      .issues-block ul,
      .missing-files-block ul {
        list-style: disc;
        padding-left: 1.25rem;
        color: #4b5563;
      }

      .issues-block li,
      .missing-files-block li {
        margin-bottom: 0.2rem;
      }

      .error-msg {
        color: #b91c1c;
        background: #fef2f2;
        border: 1px solid #fca5a5;
        border-radius: 4px;
        padding: 0.6rem 0.9rem;
        font-size: 0.9rem;
      }

      .spinner {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 0;
        font-size: 0.9rem;
        color: #6b7280;
      }

      .spinner::before {
        content: '';
        width: 1.25rem;
        height: 1.25rem;
        border: 3px solid #e5e7eb;
        border-top-color: #4f6ef7;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .warning-msg {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #92400e;
        background: #fffbeb;
        border: 1px solid #fcd34d;
        border-radius: 4px;
        padding: 0.6rem 0.9rem;
        font-size: 0.9rem;
        margin-bottom: 0.75rem;
      }

      .warning-close {
        margin-left: auto;
        padding: 0 0.3rem;
        background: transparent;
        border: none;
        font-size: 1rem;
        cursor: pointer;
        color: #92400e;
        opacity: 0.7;
        line-height: 1;
      }

      .warning-close:hover {
        opacity: 1;
      }

      /* ── Inline button spinner ──────────────────────────────────────────── */
      .btn-spinner {
        display: inline-block;
        width: 0.9rem;
        height: 0.9rem;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 0.4rem;
      }

      /* ── Success toast ───────────────────────────────────────────────────── */
      .success-toast {
        position: fixed;
        top: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: #ecfdf5;
        border: 1px solid #6ee7b7;
        border-radius: 8px;
        padding: 1rem 1.75rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        z-index: 10000;
        animation: slideDown 0.3s ease-out;
      }

      .success-toast .success-icon {
        font-size: 1.5rem;
        line-height: 1;
      }

      .success-toast .success-msg {
        font-size: 0.95rem;
        font-weight: 500;
        color: #065f46;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateX(-50%) translateY(-1rem); }
        to   { opacity: 1; transform: translateX(-50%) translateY(0); }
      }

      #source-type-group {
        display: flex;
        gap: 1.25rem;
        flex-wrap: wrap;
        margin-top: 0.25rem;
      }

      .radio-label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.9rem;
        font-weight: 400;
        color: #374151;
        cursor: pointer;
        margin-bottom: 0;
      }

      .radio-label input[type="radio"] {
        width: auto;
        cursor: pointer;
      }

      .optional {
        font-weight: 400;
        color: #9ca3af;
        font-size: 0.8rem;
      }

      .s3-bucket-info {
        font-size: 0.9rem;
        color: #6b7280;
      }

      .s3-bucket-info em {
        font-style: italic;
        color: #9ca3af;
      }

      #s3-file-list li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.35rem 0;
        border-bottom: 1px solid #f3f4f6;
        font-size: 0.875rem;
      }

      #s3-file-list li:last-child {
        border-bottom: none;
      }

      .s3-delete-btn {
        background: #fee2e2;
        color: #b91c1c;
        padding: 0.2rem 0.6rem;
        font-size: 0.8rem;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .s3-delete-btn:hover:not(:disabled) {
        background: #fecaca;
      }

      .s3-download-btn {
        background: #dbeafe;
        color: #1d4ed8;
        padding: 0.2rem 0.6rem;
        font-size: 0.8rem;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .s3-download-btn:hover:not(:disabled) {
        background: #bfdbfe;
      }

      .s3-toggle-btn {
        background: transparent;
        border: none;
        font-size: 1rem;
        cursor: pointer;
        padding: 0.1rem 0.3rem;
        color: #374151;
        line-height: 1;
        border-radius: 3px;
      }

      .s3-toggle-btn:hover {
        background: #e5e7eb;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Document RAG</h1>

      <div class="card">
        <form id="query-form">
          <input type="hidden" name="source_type" value="s3">

          <!-- S3 fields (visible by default) -->
          <div id="s3-fields">
            <!-- Read-only bucket info -->
            <div class="field">
              <p id="s3-bucket-info" class="s3-bucket-info" data-bucket="">Bucket: <em>loading…</em></p>
            </div>

            <!-- File manager -->
            <div id="s3-file-manager">
              <div class="field">
                <div style="display:flex;align-items:center;gap:0.5rem;">
                  <strong>Archivos en bucket (<span id="s3-file-count">0</span>)</strong>
                  <button type="button" id="s3-toggle-btn" class="s3-toggle-btn" aria-label="Expand file list" aria-expanded="false">&#9656;</button>
                </div>
                <div id="s3-file-list-container" style="display:none;">
                  <p id="s3-no-files" style="color:#6b7280;font-size:0.875rem;margin-top:0.5rem;">No hay archivos en el bucket.</p>
                  <ul id="s3-file-list" style="list-style:none;padding:0;margin-top:0.5rem;">
                    <!-- populated by JS: GET /s3/files -->
                  </ul>
                </div>
              </div>

              <div class="field">
                <label for="s3-upload-input">Subir archivos</label>
                <div id="s3-upload-form">
                  <input id="s3-upload-input" type="file" multiple accept=".pdf,application/pdf">
                  <button type="button" id="s3-upload-btn">Subir</button>
                </div>
                <p id="s3-upload-error" style="color:#b91c1c;font-size:0.85rem;margin-top:0.4rem;white-space:pre-line;"></p>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="query">Pregunta</label>
            <textarea id="query" name="query" rows="5">
{{ standard_prompt }}</textarea
            >
          </div>

          <div class="actions">
            <button type="submit" id="submit-btn">Preguntar</button>
            <button type="button" id="reload-btn">Recargar cache</button>
          </div>
        </form>
      </div>

      <div class="card">
        <div id="results-panel"></div>
      </div>
    </div>

    {% raw %}
    <script>
      var ALLOWED_EXTENSION = ".pdf";
      var MAX_FILE_SIZE = 52428800; // 50 MB in bytes

      /**
       * Validate a list of files for extension and size.
       * @param {FileList} files - Files from the input element
       * @returns {{ valid: boolean, errors: string[] }}
       */
      function validateFiles(files) {
        var errors = [];
        for (const element of files) {
          var file = element;
          if (!file.name.toLowerCase().endsWith(ALLOWED_EXTENSION)) {
            errors.push('"' + file.name + '" is not a PDF file.');
          }
          if (file.size > MAX_FILE_SIZE) {
            errors.push('"' + file.name + '" exceeds the 50 MB size limit.');
          }
        }
        return { valid: errors.length === 0, errors: errors };
      }

      var _fileListCollapsed = true; // default: collapsed

      function toggleFileList() {
        _fileListCollapsed = !_fileListCollapsed;
        applyFileListState();
      }

      function applyFileListState() {
        var container = document.getElementById('s3-file-list-container');
        var btn = document.getElementById('s3-toggle-btn');

        if (_fileListCollapsed) {
          container.style.display = 'none';
          btn.innerHTML = '&#9656;'; // ▸
          btn.setAttribute('aria-expanded', 'false');
          btn.setAttribute('aria-label', 'Expand file list');
        } else {
          container.style.display = '';
          btn.innerHTML = '&#9662;'; // ▾
          btn.setAttribute('aria-expanded', 'true');
          btn.setAttribute('aria-label', 'Collapse file list');
        }
      }

      document.getElementById('s3-toggle-btn').addEventListener('click', toggleFileList);

      function loadBucketInfo() {
        var el = document.getElementById('s3-bucket-info');
        fetch('/s3/config')
          .then(function (response) {
            return response.json().then(function (data) {
              if (response.ok) {
                el.textContent = 'Bucket: ' + data.bucket;
                el.dataset.bucket = data.bucket;
              } else {
                el.textContent = data.error || 'Unknown error';
                el.dataset.bucket = '';
              }
            });
          })
          .catch(function (err) {
            el.textContent = 'Error loading bucket info';
            el.dataset.bucket = '';
          });
      }

      function loadFileList() {
        var fileList = document.getElementById('s3-file-list');
        var noFiles = document.getElementById('s3-no-files');
        var fileManager = document.getElementById('s3-file-manager');

        fetch('/s3/files')
          .then(function (response) {
            if (!response.ok) {
              return response.json().then(function (data) {
                throw new Error(data.error || 'Failed to load file list');
              });
            }
            return response.json();
          })
          .then(function (data) {
            fileList.innerHTML = '';
            var files = data.files || [];

            var countEl = document.getElementById('s3-file-count');
            if (countEl) countEl.textContent = files.length;

            if (files.length === 0) {
              noFiles.style.display = '';
            } else {
              noFiles.style.display = 'none';
              files.forEach(function (key) {
                var li = document.createElement('li');
                var span = document.createElement('span');
                span.textContent = key;
                var btnGroup = document.createElement('span');
                btnGroup.style.display = 'flex';
                btnGroup.style.gap = '0.4rem';
                var downloadBtn = document.createElement('button');
                downloadBtn.type = 'button';
                downloadBtn.className = 's3-download-btn';
                downloadBtn.setAttribute('data-key', key);
                downloadBtn.textContent = 'Descargar';
                var deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 's3-delete-btn';
                deleteBtn.setAttribute('data-key', key);
                deleteBtn.textContent = 'Eliminar';
                btnGroup.appendChild(downloadBtn);
                btnGroup.appendChild(deleteBtn);
                li.appendChild(span);
                li.appendChild(btnGroup);
                fileList.appendChild(li);
              });
            }
          })
          .catch(function (err) {
            var errEl = document.createElement('p');
            errEl.className = 'error-msg';
            errEl.textContent = 'Error: ' + err.message;
            fileManager.appendChild(errEl);
          });
      }

      (function () {
        var fileList = document.getElementById('s3-file-list');

        fileList.addEventListener('click', function (event) {
          var btn = event.target.closest('.s3-delete-btn');
          if (!btn) return;

          event.preventDefault();
          event.stopPropagation();

          var key = btn.dataset.key;
          if (!key) return;

          if (!confirm('Borrar ' + key + '?')) return;

          fetch('/s3/files/' + key, { method: 'DELETE' })
            .then(function (response) {
              return response.json().then(function (data) {
                if (response.ok) {
                  // Remove the <li> from DOM
                  var li = btn.closest('li');
                  if (li) li.remove();
                  // Update file count
                  var countEl = document.getElementById('s3-file-count');
                  if (countEl) countEl.textContent = fileList.children.length;
                  // Show empty state if list is now empty
                  var noFiles = document.getElementById('s3-no-files');
                  if (fileList.children.length === 0 && noFiles) {
                    noFiles.style.display = '';
                  }
                } else {
                  // Display error message from server
                  var errMsg = data.error || 'Failed to delete file.';
                  var fileManager = document.getElementById('s3-file-manager');
                  var existingErr = fileManager.querySelector('.s3-delete-error');
                  if (existingErr) existingErr.remove();
                  var errEl = document.createElement('p');
                  errEl.className = 'error-msg s3-delete-error';
                  errEl.textContent = 'Error: ' + errMsg;
                  fileManager.appendChild(errEl);
                }
              });
            })
            .catch(function (err) {
              // Network error — display generic message
              var fileManager = document.getElementById('s3-file-manager');
              var existingErr = fileManager.querySelector('.s3-delete-error');
              if (existingErr) existingErr.remove();
              var errEl = document.createElement('p');
              errEl.className = 'error-msg s3-delete-error';
              errEl.textContent = 'Error: Network error while deleting file.';
              fileManager.appendChild(errEl);
            });
        });
      })();

      (function () {
        var fileList = document.getElementById('s3-file-list');

        fileList.addEventListener('click', function (event) {
          var btn = event.target.closest('.s3-download-btn');
          if (!btn) return;

          event.preventDefault();
          event.stopPropagation();

          var key = btn.dataset.key;
          if (!key) return;

          // Trigger download via a temporary hidden link
          var a = document.createElement('a');
          a.href = '/s3/files/' + encodeURIComponent(key) + '/download';
          a.download = key;
          document.body.appendChild(a);
          a.click();
          a.remove();
        });
      })();



      document.addEventListener('DOMContentLoaded', function () {
        loadBucketInfo();
        loadFileList();
      });



      (function () {
        var uploadBtn = document.getElementById('s3-upload-btn');
        var uploadInput = document.getElementById('s3-upload-input');
        var uploadError = document.getElementById('s3-upload-error');

        function showUploadError(msg) {
          uploadError.textContent = msg;
          clearTimeout(uploadError._timer);
          uploadError._timer = setTimeout(function () {
            uploadError.textContent = '';
          }, 5000);
        }

        function clearUploadError() {
          uploadError.textContent = '';
          clearTimeout(uploadError._timer);
        }

        uploadBtn.addEventListener('click', function () {
          clearUploadError();

          // Validate at least one file is selected
          if (!uploadInput.files || uploadInput.files.length < 1) {
            showUploadError('Please select at least one file to upload.');
            return;
          }

          // Validate files for extension and size before uploading
          var result = validateFiles(uploadInput.files);
          if (!result.valid) {
            uploadError.textContent = result.errors.join('\n');
            return;
          }

          // Build FormData manually from the file input
          var formData = new FormData();
          for (const element of uploadInput.files) {
            formData.append('files', element);
          }

          // Block the entire UI with spinner in button
          _setAllControlsDisabled(true);
          _showBtnSpinner(uploadBtn, 'Subiendo…');

          fetch('/s3/files', {
            method: 'POST',
            body: formData
            // Do NOT set Content-Type — let the browser set the multipart boundary
          })
            .then(function (response) {
              return response.json().then(function (data) {
                if (response.ok) {
                  // Success: refresh file list and clear the input
                  uploadInput.value = '';
                  loadFileList();
                  _hideBtnSpinner(uploadBtn);
                  _showSuccessToast('¡La base de datos de documentos ha sido actualizada!');
                } else {
                  // Server error
                  _hideBtnSpinner(uploadBtn);
                  showUploadError(data.error || 'Upload failed.');
                }
              });
            })
            .catch(function (err) {
              // Network error
              _hideBtnSpinner(uploadBtn);
              showUploadError('Network error: ' + err.message);
            })
            .finally(function () {
              _setAllControlsDisabled(false);
            });
        });
      })();



      (function () {
        const form = document.getElementById('query-form');
        const submitBtn = document.getElementById('submit-btn');
        const reloadBtn = document.getElementById('reload-btn');
        const panel = document.getElementById('results-panel');

        function setButtons(disabled) {
          submitBtn.disabled = disabled;
          reloadBtn.disabled = disabled;
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          setButtons(true);

          // Clear the results panel and show spinner
          panel.innerHTML = '';
          const spinnerEl = document.createElement('div');
          spinnerEl.className = 'spinner';
          spinnerEl.textContent = 'Processing your question…';
          panel.appendChild(spinnerEl);

          const answerEl = document.createElement('div');
          answerEl.id = 'answer-text';
          panel.appendChild(answerEl);

          // Buffer to accumulate raw markdown text for progressive rendering
          let rawAnswer = '';

          const formData = new FormData(form);

          let response;
          try {
            response = await fetch('/ask', {
              method: 'POST',
              body: new URLSearchParams(formData),
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            });
          } catch (fetchErr) {
            panel.innerHTML = '';
            const errEl = document.createElement('p');
            errEl.className = 'error-msg';
            errEl.textContent = 'Error: ' + fetchErr.message;
            panel.appendChild(errEl);
            setButtons(false);
            return;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          function processBuffer() {
            const messages = buffer.split('\n\n');
            buffer = messages.pop(); // keep incomplete last chunk

            for (const message of messages) {
              if (!message.trim()) continue;

              const lines = message.split('\n');
              let eventType = null;
              let dataLine = null;

              for (const line of lines) {
                if (line.startsWith('event:')) {
                  eventType = line.slice(6).trim();
                } else if (line.startsWith('data:')) {
                  dataLine = line.slice(5).trim();
                }
              }

              if (dataLine === null) continue;

              let parsed;
              try {
                parsed = JSON.parse(dataLine);
              } catch (_) {
                continue;
              }

              if (eventType === 'done') {
                renderDone(parsed);
              } else if (eventType === 'error') {
                renderError(parsed.error || 'Unknown error');
              } else if (eventType === 'warning') {
                renderWarning(parsed.warning || 'Warning');
              } else if (parsed.token != null) {
                // Remove spinner and show answer area on first token
                if (spinnerEl.parentNode) {
                  spinnerEl.remove();
                  panel.appendChild(answerEl);
                }
                rawAnswer += parsed.token;
                answerEl.innerHTML = marked.parse(rawAnswer);
              }
            }
          }

          function renderDone(meta) {
            if (spinnerEl.parentNode) spinnerEl.remove();
            // Citations
            if (meta.docs) {
              const details = document.createElement('details');
              details.className = 'citations-block';
              const summary = document.createElement('summary');
              summary.textContent = 'Referencias';
              const pre = document.createElement('pre');
              // meta.docs is an array of {filename, token_count} objects
              if (Array.isArray(meta.docs)) {
                const seen = new Set();
                const lines = meta.docs
                  .filter(function (d) {
                    if (seen.has(d.filename)) return false;
                    seen.add(d.filename);
                    return true;
                  })
                  .map(function (d) {
                    var label = '- ' + d.filename;
                    if (d.pages && d.pages.length) {
                      label += ' (pp. ' + d.pages.join(', ') + ')';
                    }
                    if (d.token_count) {
                      label += ' [' + d.token_count + ' tokens]';
                    }
                    return label;
                  });
                pre.textContent = lines.join('\n');
              } else {
                pre.textContent = String(meta.docs);
              }
              details.appendChild(summary);
              details.appendChild(pre);
              panel.appendChild(details);
            }

            // Scores
            const scoresDiv = document.createElement('div');
            scoresDiv.className = 'scores';
            if (meta.grounding_score != null) {
              const gs = document.createElement('p');
              gs.className = 'score-item';
              const gsLabel = document.createElement('strong');
              gsLabel.textContent = 'Grounding score: ';
              gs.appendChild(gsLabel);
              gs.appendChild(document.createTextNode(Number(meta.grounding_score).toFixed(2)));
              scoresDiv.appendChild(gs);
            }
            if (meta.completeness_score != null) {
              const cs = document.createElement('p');
              cs.className = 'score-item';
              const csLabel = document.createElement('strong');
              csLabel.textContent = 'Completeness score: ';
              cs.appendChild(csLabel);
              cs.appendChild(document.createTextNode(Number(meta.completeness_score).toFixed(2)));
              scoresDiv.appendChild(cs);
            }
            if (scoresDiv.hasChildNodes()) panel.appendChild(scoresDiv);

            // Token usage & response time
            if (meta.input_tokens != null || meta.output_tokens != null || meta.elapsed_seconds != null || meta.retrieval_seconds != null || meta.llm_seconds != null) {
              const statsDiv = document.createElement('div');
              statsDiv.className = 'scores';
              if (meta.retrieval_seconds != null) {
                const rt = document.createElement('p');
                rt.className = 'score-item';
                const rtLabel = document.createElement('strong');
                rtLabel.textContent = 'Tiempo de retrieval(GCP): ';
                rt.appendChild(rtLabel);
                rt.appendChild(document.createTextNode(meta.retrieval_seconds + 's'));
                statsDiv.appendChild(rt);
              }
              if (meta.llm_seconds != null) {
                const lt = document.createElement('p');
                lt.className = 'score-item';
                const ltLabel = document.createElement('strong');
                ltLabel.textContent = 'Tiempo de LLM(AWS): ';
                lt.appendChild(ltLabel);
                lt.appendChild(document.createTextNode(meta.llm_seconds + 's'));
                statsDiv.appendChild(lt);
              }
              if (meta.elapsed_seconds != null) {
                const et = document.createElement('p');
                et.className = 'score-item';
                const etLabel = document.createElement('strong');
                etLabel.textContent = 'Tiempo total: ';
                et.appendChild(etLabel);
                et.appendChild(document.createTextNode(meta.elapsed_seconds + 's'));
                statsDiv.appendChild(et);
              }
              if (meta.input_tokens != null) {
                const it = document.createElement('p');
                it.className = 'score-item';
                const itLabel = document.createElement('strong');
                itLabel.textContent = 'Input tokens: ';
                it.appendChild(itLabel);
                it.appendChild(document.createTextNode(meta.input_tokens.toLocaleString()));
                statsDiv.appendChild(it);
              }
              if (meta.output_tokens != null) {
                const ot = document.createElement('p');
                ot.className = 'score-item';
                const otLabel = document.createElement('strong');
                otLabel.textContent = 'Output tokens: ';
                ot.appendChild(otLabel);
                ot.appendChild(document.createTextNode(meta.output_tokens.toLocaleString()));
                statsDiv.appendChild(ot);
              }
              // Cost calculation: $3.00/1M input tokens, $15.00/1M output tokens
              if (meta.input_tokens != null && meta.output_tokens != null) {
                const inputCost = (meta.input_tokens / 1_000_000) * 3;
                const outputCost = (meta.output_tokens / 1_000_000) * 15;
                const totalCost = inputCost + outputCost;
                const icEl = document.createElement('p');
                icEl.className = 'score-item';
                const icLabel = document.createElement('strong');
                icLabel.textContent = 'Costo input: ';
                icEl.appendChild(icLabel);
                icEl.appendChild(document.createTextNode('$' + inputCost.toFixed(4) + ' USD'));
                statsDiv.appendChild(icEl);
                const ocEl = document.createElement('p');
                ocEl.className = 'score-item';
                const ocLabel = document.createElement('strong');
                ocLabel.textContent = 'Costo output: ';
                ocEl.appendChild(ocLabel);
                ocEl.appendChild(document.createTextNode('$' + outputCost.toFixed(4) + ' USD'));
                statsDiv.appendChild(ocEl);
                const costEl = document.createElement('p');
                costEl.className = 'score-item';
                const costLabel = document.createElement('strong');
                costLabel.textContent = 'Costo total: ';
                costEl.appendChild(costLabel);
                costEl.appendChild(document.createTextNode('$' + totalCost.toFixed(4) + ' USD'));
                statsDiv.appendChild(costEl);
              }
              panel.appendChild(statsDiv);
            }

            // Flagged warning
            if (meta.flagged) {
              const warn = document.createElement('p');
              warn.className = 'flagged-warning';
              warn.textContent = '\u26a0 Flagged';
              panel.appendChild(warn);
            }

            // Issues
            if (Array.isArray(meta.issues) && meta.issues.length) {
              const issuesDiv = document.createElement('div');
              issuesDiv.className = 'issues-block';
              const h4 = document.createElement('h4');
              h4.textContent = 'Issues';
              const ul = document.createElement('ul');
              meta.issues.forEach(function (issue) {
                const li = document.createElement('li');
                li.textContent = issue;
                ul.appendChild(li);
              });
              issuesDiv.appendChild(h4);
              issuesDiv.appendChild(ul);
              panel.appendChild(issuesDiv);
            }

            // Missing files
            if (Array.isArray(meta.missing_files) && meta.missing_files.length) {
              const mfDiv = document.createElement('div');
              mfDiv.className = 'missing-files-block';
              const h4 = document.createElement('h4');
              h4.textContent = 'Missing files';
              const ul = document.createElement('ul');
              meta.missing_files.forEach(function (f) {
                const li = document.createElement('li');
                li.textContent = f;
                ul.appendChild(li);
              });
              mfDiv.appendChild(h4);
              mfDiv.appendChild(ul);
              panel.appendChild(mfDiv);
            }
          }

          function renderError(message) {
            if (spinnerEl.parentNode) spinnerEl.remove();
            if (answerEl.parentNode && !answerEl.textContent) {
              answerEl.remove();
            }
            const errEl = document.createElement('p');
            errEl.className = 'error-msg';
            errEl.textContent = 'Error: ' + message;
            panel.appendChild(errEl);
          }

          function renderWarning(message) {
            const warnEl = document.createElement('p');
            warnEl.className = 'warning-msg';
            warnEl.textContent = '\u26a0 ' + message;
            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = 'warning-close';
            closeBtn.setAttribute('aria-label', 'Dismiss warning');
            closeBtn.textContent = '\u00d7';
            closeBtn.addEventListener('click', function () { warnEl.remove(); });
            warnEl.appendChild(closeBtn);
            panel.insertBefore(warnEl, panel.firstChild);
          }

          // Read the SSE stream
          try {
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              processBuffer();
            }
            // Flush any remaining content
            buffer += decoder.decode();
            processBuffer();
          } catch (streamErr) {
            renderError(streamErr.message);
          } finally {
            setButtons(false);
          }
        });
      })();



      (function () {
        /**
         * Show a spinner inside a button, replacing its text.
         * Stores the original text so it can be restored later.
         */
        globalThis._showBtnSpinner = function (btn, loadingText) {
          btn._originalText = btn.textContent;
          btn.innerHTML = '';
          var spinner = document.createElement('span');
          spinner.className = 'btn-spinner';
          btn.appendChild(spinner);
          btn.appendChild(document.createTextNode(loadingText || 'Procesando…'));
        };

        globalThis._hideBtnSpinner = function (btn) {
          if (btn._originalText != null) {
            btn.textContent = btn._originalText;
            delete btn._originalText;
          }
        };

        /**
         * Show a friendly success toast, auto-dismisses after 4 seconds.
         */
        globalThis._showSuccessToast = function (message) {
          var toast = document.createElement('div');
          toast.className = 'success-toast';
          var icon = document.createElement('span');
          icon.className = 'success-icon';
          icon.textContent = '✓';
          var msg = document.createElement('span');
          msg.className = 'success-msg';
          msg.textContent = message || '¡La base de datos de documentos ha sido actualizada!';
          toast.appendChild(icon);
          toast.appendChild(msg);
          document.body.appendChild(toast);
          setTimeout(function () { toast.remove(); }, 4000);
        };

        /**
         * Disable/enable all interactive controls.
         */
        globalThis._setAllControlsDisabled = function (disabled) {
          var submitBtn = document.getElementById('submit-btn');
          var reloadBtn = document.getElementById('reload-btn');
          var uploadBtn = document.getElementById('s3-upload-btn');
          var uploadInput = document.getElementById('s3-upload-input');
          var queryField = document.getElementById('query');
          if (submitBtn) submitBtn.disabled = disabled;
          if (reloadBtn) reloadBtn.disabled = disabled;
          if (uploadBtn) uploadBtn.disabled = disabled;
          if (uploadInput) uploadInput.disabled = disabled;
          if (queryField) queryField.disabled = disabled;
        };
      })();



      (function () {
        const reloadBtn = document.getElementById('reload-btn');

        reloadBtn.addEventListener('click', function () {
          // Block the entire UI and show spinner in button
          _setAllControlsDisabled(true);
          _showBtnSpinner(reloadBtn, 'Recargando…');

          fetch('/reload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: '',
          })
            .then(function (response) {
              var contentType = response.headers.get('content-type') || '';
              if (!contentType.includes('application/json')) {
                // Server returned non-JSON (e.g. HTML error page from proxy/gunicorn crash)
                throw new Error(
                  'El servidor respondió con un error (' + response.status + '). ' +
                  'Es posible que el proceso se haya quedado sin memoria o haya excedido el tiempo límite.'
                );
              }
              return response.json().then(function (data) {
                if (response.ok) {
                  _hideBtnSpinner(reloadBtn);
                  _showSuccessToast('¡La base de datos de documentos ha sido actualizada!');
                } else {
                  _hideBtnSpinner(reloadBtn);
                  alert('Error: ' + (data.error || response.statusText));
                }
              });
            })
            .catch(function (err) {
              _hideBtnSpinner(reloadBtn);
              alert('Error: ' + err.message);
            })
            .finally(function () {
              _setAllControlsDisabled(false);
            });
        });
      })();
    </script>
